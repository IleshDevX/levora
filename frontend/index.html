<!DOCTYPE html>
<html lang="en" ng-app="levoraApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levora — Leave Management</title>
    <link rel="icon" type="image/svg+xml" href="assets/levora-icon.svg">

    <!-- ng-cloak: hide uncompiled AngularJS content -->
    <style>[ng-cloak] { display: none !important; }</style>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Custom SaaS Styles -->
    <link href="css/levora.css" rel="stylesheet">
</head>

<body ng-cloak>
    <!-- Top Navigation Bar -->
    <div ng-controller="NavController">
    <nav class="navbar navbar-expand-lg levora-navbar fixed-top" ng-if="isLoggedIn" ng-cloak>
        <div class="container-fluid px-4">
            <a class="navbar-brand levora-brand" ng-click="navigate(user.role ? '/' + user.role + '/dashboard' : '/login')" style="cursor: pointer;">
                <i class="bi bi-layers-fill me-2"></i>Levora
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto">
                    <!-- Employee Nav -->
                    <li class="nav-item" ng-if="user.role === 'employee'">
                        <a class="nav-link" ng-click="navigate('/employee/dashboard')" ng-class="{'active': isActive('/employee/dashboard')}" style="cursor: pointer;">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'employee'">
                        <a class="nav-link" ng-click="navigate('/employee/apply')" ng-class="{'active': isActive('/employee/apply')}" style="cursor: pointer;">
                            <i class="bi bi-plus-circle me-1"></i>Apply Leave
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'employee'">
                        <a class="nav-link" ng-click="navigate('/employee/history')" ng-class="{'active': isActive('/employee/history')}" style="cursor: pointer;">
                            <i class="bi bi-clock-history me-1"></i>My Leaves
                        </a>
                    </li>

                    <!-- Manager Nav -->
                    <li class="nav-item" ng-if="user.role === 'manager'">
                        <a class="nav-link" ng-click="navigate('/manager/dashboard')" ng-class="{'active': isActive('/manager/dashboard')}" style="cursor: pointer;">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'manager'">
                        <a class="nav-link" ng-click="navigate('/manager/pending')" ng-class="{'active': isActive('/manager/pending')}" style="cursor: pointer;">
                            <i class="bi bi-hourglass-split me-1"></i>Pending
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'manager'">
                        <a class="nav-link" ng-click="navigate('/manager/history')" ng-class="{'active': isActive('/manager/history')}" style="cursor: pointer;">
                            <i class="bi bi-clock-history me-1"></i>Team History
                        </a>
                    </li>

                    <!-- Admin Nav -->
                    <li class="nav-item" ng-if="user.role === 'admin'">
                        <a class="nav-link" ng-click="navigate('/admin/dashboard')" ng-class="{'active': isActive('/admin/dashboard')}" style="cursor: pointer;">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'admin'">
                        <a class="nav-link" ng-click="navigate('/admin/employees')" ng-class="{'active': isActive('/admin/employees')}" style="cursor: pointer;">
                            <i class="bi bi-people me-1"></i>Employees
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'admin'">
                        <a class="nav-link" ng-click="navigate('/admin/leave-types')" ng-class="{'active': isActive('/admin/leave-types')}" style="cursor: pointer;">
                            <i class="bi bi-tags me-1"></i>Leave Types
                        </a>
                    </li>
                    <li class="nav-item" ng-if="user.role === 'admin'">
                        <a class="nav-link" ng-click="navigate('/admin/leaves')" ng-class="{'active': isActive('/admin/leaves')}" style="cursor: pointer;">
                            <i class="bi bi-list-check me-1"></i>All Leaves
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <div class="levora-user-badge me-3">
                        <i class="bi bi-person-circle me-1"></i>
                        <span>{{user.name}}</span>
                        <span class="badge levora-role-badge ms-2">{{user.role | uppercase}}</span>
                    </div>
                    <button class="btn btn-outline-light btn-sm levora-btn-logout" ng-click="logout()">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>
    </div>

    <!-- Main Content Area -->
    <div class="levora-content" ng-class="{'levora-content-full': !$root.isLoggedIn}">
        <!-- Toast Container -->
        <div class="levora-toast-container" ng-controller="ToastController" ng-cloak>
            <div class="levora-toast" ng-repeat="toast in toasts track by $index" ng-class="'levora-toast-' + toast.type"
                ng-style="{'animation-delay': ($index * 0.1) + 's'}">
                <div class="d-flex align-items-center">
                    <i class="bi me-2" ng-class="{
                        'bi-check-circle-fill': toast.type === 'success',
                        'bi-exclamation-circle-fill': toast.type === 'error',
                        'bi-info-circle-fill': toast.type === 'info'
                    }"></i>
                    <span ng-bind="toast.message"></span>
                </div>
                <button class="btn-close btn-close-sm" ng-click="removeToast($index)"></button>
            </div>
        </div>

        <!-- AngularJS View -->
        <div ng-view></div>
    </div>

    <!-- Loading Overlay -->
    <div class="levora-loading-overlay" ng-controller="LoadingController" ng-show="isLoading" style="display:none">
        <div class="levora-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading...</p>
        </div>
    </div>

    <!-- Scripts (local vendor files) -->
    <script src="vendor/bootstrap.bundle.min.js"></script>
    <script src="vendor/angular.min.js"></script>
    <script src="vendor/angular-route.min.js"></script>
    <script src="vendor/chart.umd.min.js"></script>

    <!-- App Scripts -->
    <script src="js/app.js"></script>
    <script src="js/services/authService.js"></script>
    <script src="js/services/leaveService.js"></script>
    <script src="js/services/adminService.js"></script>
    <script src="js/services/dashboardService.js"></script>
    <script src="js/services/toastService.js"></script>
    <script src="js/controllers/navController.js"></script>
    <script src="js/controllers/toastController.js"></script>
    <script src="js/controllers/loadingController.js"></script>
    <script src="js/controllers/loginController.js"></script>
    <script src="js/controllers/employeeDashboardController.js"></script>
    <script src="js/controllers/applyLeaveController.js"></script>
    <script src="js/controllers/leaveHistoryController.js"></script>
    <script src="js/controllers/managerDashboardController.js"></script>
    <script src="js/controllers/managerPendingController.js"></script>
    <script src="js/controllers/managerHistoryController.js"></script>
    <script src="js/controllers/adminDashboardController.js"></script>
    <script src="js/controllers/adminEmployeesController.js"></script>
    <script src="js/controllers/adminLeaveTypesController.js"></script>
    <script src="js/controllers/adminLeavesController.js"></script>
</body>

</html>
